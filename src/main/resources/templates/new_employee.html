<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Employee Management System</title>
<link rel="stylesheet"
	href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
	integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
	crossorigin="anonymous">
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell form-shell">
	<header class="topbar">
		<div class="brand-block">
			<span class="brand-eyebrow">Employee Admin</span>
			<h1 class="brand-title">Create Employee Record</h1>
			<p class="brand-copy">新しい従業員情報を登録する入力画面です。</p>
		</div>
		<div class="nav-actions">
			<a th:href="@{/}" class="btn-app btn-secondary-app">Back to List</a>
			<a href="#" class="btn-app btn-ghost-app btn-disabled-app" aria-disabled="true">Login</a>
		</div>
	</header>

	<section class="form-card">
		<div class="section-header">
			<div>
				<h2 class="section-title">Save Employee</h2>
				<p class="section-copy">将来の入力チェック追加を想定し、フォーム中心のレイアウトに整理しています。</p>
			</div>
			<span class="status-chip">Back-end validation: not implemented</span>
		</div>

		<form action="#" th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
			<div class="form-grid">
				<div>
					<label class="form-label" for="firstName">First Name</label>
					<input id="firstName" type="text" th:field="*{firstName}" placeholder="Employee First Name" class="form-input">
				</div>
				<div>
					<label class="form-label" for="lastName">Last Name</label>
					<input id="lastName" type="text" th:field="*{lastName}" placeholder="Employee Last Name" class="form-input">
				</div>
				<div>
					<label class="form-label" for="email">Email</label>
					<input id="email" type="text" th:field="*{email}" placeholder="Employee Email" class="form-input">
				</div>
			</div>

			<div class="form-actions mt-4">
				<button type="submit" class="btn-app btn-primary-app">Save Employee</button>
				<a th:href="@{/}" class="btn-app btn-secondary-app">Back</a>
				<a href="#" class="btn-app btn-ghost-app btn-disabled-app" aria-disabled="true">Preview Profile</a>
			</div>
		</form>

		<div class="helper-card">
			<h3 class="helper-title">今後の課題候補</h3>
			<ul class="helper-list">
				<li>必須入力チェックの追加</li>
				<li>メールアドレス形式チェック</li>
				<li>保存完了メッセージ表示</li>
			</ul>
		</div>
	</section>
</div>
</body>
</html>
