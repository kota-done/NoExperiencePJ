<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Employee Management System</title>
<link rel="stylesheet"
	href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell form-shell">
	<header class="topbar">
		<div class="brand-block">
			<span class="brand-eyebrow">Employee Admin</span>
			<h1 class="brand-title">Update Employee Record</h1>
			<p class="brand-copy">既存の従業員情報を修正する画面です。</p>
		</div>
		<div class="nav-actions">
			<a th:href="@{/}" class="btn-app btn-secondary-app">Back to List</a>
			<a href="#" class="btn-app btn-ghost-app btn-disabled-app" aria-disabled="true">Login</a>
		</div>
	</header>

	<section class="form-card">
		<div class="section-header">
			<div>
				<h2 class="section-title">Update Employee</h2>
				<p class="section-copy">編集導線を明示し、一覧画面へ戻るナビゲーションも同時に配置しています。</p>
			</div>
			<span class="status-chip">Audit log: placeholder only</span>
		</div>

		<form action="#" th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
			<input type="hidden" th:field="*{id}" />

			<div class="form-grid">
				<div>
					<label class="form-label" for="firstName">First Name</label>
					<input id="firstName" type="text" th:field="*{firstName}" class="form-input">
				</div>
				<div>
					<label class="form-label" for="lastName">Last Name</label>
					<input id="lastName" type="text" th:field="*{lastName}" class="form-input">
				</div>
				<div>
					<label class="form-label" for="email">Email</label>
					<input id="email" type="text" th:field="*{email}" class="form-input">
				</div>
			</div>

			<div class="form-actions mt-4">
				<button type="submit" class="btn-app btn-primary-app">Update Employee</button>
				<a th:href="@{/}" class="btn-app btn-secondary-app">Back</a>
				<a href="#" class="btn-app btn-ghost-app btn-disabled-app" aria-disabled="true">View History</a>
			</div>
		</form>

		<div class="helper-card">
			<h3 class="helper-title">今後の課題候補</h3>
			<ul class="helper-list">
				<li>更新前後比較の表示</li>
				<li>確認ダイアログの実装</li>
				<li>更新履歴表示機能の追加</li>
			</ul>
		</div>
	</section>
</div>
</body>
</html>
